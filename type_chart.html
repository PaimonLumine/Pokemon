    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 36px;
        }
        
        .lang-switch {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .lang-switch button {
            padding: 10px 24px;
            margin: 0 5px;
            border: 2px solid #4CAF50;
            background: white;
            color: #4CAF50;
            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .lang-switch button.active {
            background: #4CAF50;
            color: white;
        }
        
        .export-section {
            text-align: center;
            padding: 20px 0;
        }
        
        .export-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 32px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .export-btn:active {
            transform: translateY(0);
        }
        
        .type-selector {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .selector-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }
        
        .type-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .type-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .type-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .type-btn.selected {
            box-shadow: 0 0 0 3px white, 0 0 0 5px #333;
        }
        
        .type-btn.secondary {
            opacity: 0.7;
        }
        
        .type-btn.secondary.selected {
            opacity: 1;
        }
        
        .selected-types {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }
        
        .selected-type {
            padding: 12px 30px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .plus-sign {
            font-size: 32px;
            color: #666;
            font-weight: bold;
        }
        
        .clear-btn {
            margin-left: auto;
            padding: 10px 24px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .clear-btn:hover {
            background: #ff5252;
        }
        
        .section {
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .section-header {
            padding: 18px 24px;
            font-weight: bold;
            font-size: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section.offense .section-header {
            background: linear-gradient(135deg, #ff6b6b, #ff8585);
            color: white;
        }
        
        .section.defense .section-header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .type-display {
            background: rgba(255,255,255,0.3);
            padding: 6px 18px;
            border-radius: 22px;
            font-size: 16px;
        }
        
        .section-content {
            background: #fafafa;
            padding: 20px;
        }
        
        .category {
            margin-bottom: 15px;
            padding: 18px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            gap: 18px;
        }
        
        .category:last-child {
            margin-bottom: 0;
        }
        
        .category-label {
            min-width: 120px;
            font-weight: bold;
            font-size: 17px;
            padding: 10px 14px;
            border-radius: 10px;
            text-align: center;
        }
        
        .super-effective .category-label {
            background: #c8e6c9;
            color: #2e7d32;
        }
        
        .not-effective .category-label {
            background: #ffccbc;
            color: #d84315;
        }
        
        .weakness .category-label {
            background: #ffcdd2;
            color: #c62828;
        }
        
        .resistance .category-label {
            background: #c8e6c9;
            color: #2e7d32;
        }
        
        .immune .category-label {
            background: #e0e0e0;
            color: #616161;
        }
        
        .category-types {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1;
        }
        
        .type-tag {
            padding: 8px 16px;
            border-radius: 18px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        
        .multiplier {
            font-size: 13px;
            opacity: 0.9;
            margin-left: 4px;
        }
        
        .empty-msg {
            color: #999;
            font-style: italic;
        }
        
        /* 颜色定义 */
        .type-normal { background: #A8A878; }
        .type-fire { background: #F08030; }
        .type-water { background: #6890F0; }
        .type-electric { background: #F8D030; }
        .type-grass { background: #78C850; }
        .type-ice { background: #98D8D8; }
        .type-fighting { background: #C03028; }
        .type-poison { background: #A040A0; }
        .type-ground { background: #E0C068; }
        .type-flying { background: #A890F0; }
        .type-psychic { background: #F85888; }
        .type-bug { background: #A8B820; }
        .type-rock { background: #B8A038; }
        .type-ghost { background: #705898; }
        .type-dragon { background: #7038F8; }
        .type-dark { background: #705848; }
        .type-steel { background: #B8B8D0; }
        .type-fairy { background: #EE99AC; }
        
        .ability-section {
            background: #fff8e1;
            border-radius: 15px;
            padding: 24px;
            margin-bottom: 25px;
        }
        
        .ability-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }
        
        .ability-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }
        
        .ability-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 12px;
        }
        
        .ability-type {
            padding: 6px 14px;
            border-radius: 18px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            min-width: 70px;
            text-align: center;
        }
        
        .ability-buttons {
            display: flex;
            gap: 6px;
        }
        
        .ability-btn {
            padding: 6px 14px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .ability-btn:hover {
            border-color: #999;
        }
        
        .ability-btn.active-x2 {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
        
        .ability-btn.active-x05 {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        
        .ability-btn.active-x0 {
            background: #9e9e9e;
            color: white;
            border-color: #9e9e9e;
        }
        
        .info-text {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 data-i18n="title">宝可梦属性相克表</h1>
        
        <div class="lang-switch">
            <button class="active" onclick="setLanguage('zh')" id="btn-zh">中文</button>
            <button onclick="setLanguage('en')" id="btn-en">English</button>
        </div>
        
        <div class="type-selector">
            <div class="selector-title">
                <span data-i18n="selectType">选择属性组合</span>
            </div>
            <div class="type-buttons" id="typeButtons1"></div>
            <div class="type-buttons" id="typeButtons2"></div>
            <div class="selected-types">
                <span data-i18n="selected">已选择:</span>
                <div id="selectedType1" class="selected-type" style="display:none"></div>
                <span id="plusSign" class="plus-sign" style="display:none">+</span>
                <div id="selectedType2" class="selected-type" style="display:none"></div>
                <span id="noneSelected" data-i18n="noneSelected">未选择</span>
                <button class="clear-btn" onclick="clearTypes()" data-i18n="clear">清除</button>
            </div>
        </div>
        
        <div class="ability-section">
            <div class="ability-title" data-i18n="abilityTitle">特性效果 (改变防御倍率)</div>
            <div class="ability-controls" id="abilityControls"></div>
            <div class="info-text" data-i18n="abilityInfo">点击按钮切换属性对防御方的伤害倍率</div>
        </div>
        
        <div class="section offense">
            <div class="section-header">
                <div class="section-title">
                    <span data-i18n="offense">进攻端</span>
                    <span class="type-display" data-i18n="superEffective">(输出克制)</span>
                </div>
            </div>
            <div class="section-content">
                <div class="category super-effective">
                    <div class="category-label" data-i18n="superEffectiveLabel">效果拔群</div>
                    <div class="category-types" id="offenseSuper"></div>
                </div>
                <div class="category not-effective">
                    <div class="category-label" data-i18n="notEffectiveLabel">效果不好</div>
                    <div class="category-types" id="offenseNot"></div>
                </div>
            </div>
        </div>
        
        <div class="section defense">
            <div class="section-header">
                <div class="section-title">
                    <span data-i18n="defense">防守端</span>
                    <span class="type-display" data-i18n="resistance">(抗性)</span>
                </div>
            </div>
            <div class="section-content">
                <div class="category weakness">
                    <div class="category-label" id="weaknessLabel">弱点 (x2)</div>
                    <div class="category-types" id="defenseWeak"></div>
                </div>
                <div class="category resistance">
                    <div class="category-label" id="resistanceLabel">抗性 (x1/2)</div>
                    <div class="category-types" id="defenseResist"></div>
                </div>
                <div class="category immune">
                    <div class="category-label" id="immuneLabel">免疫 (x0)</div>
                    <div class="category-types" id="defenseImmune"></div>
                </div>
            </div>
        </div>
        
        <div class="export-section" style="margin-top: 30px;">
            <button class="export-btn" onclick="exportToImage()" data-i18n="exportImage">
                📷 导出为图片
            </button>
        </div>
    </div>

    <script>
        // 数据定义
        const typeData = {
            "Normal": { "Rock": 0.5, "Ghost": 0, "Steel": 0.5 },
            "Fire": { "Fire": 0.5, "Water": 0.5, "Grass": 2, "Ice": 2, "Bug": 2, "Rock": 0.5, "Dragon": 0.5, "Steel": 2 },
            "Water": { "Fire": 2, "Water": 0.5, "Grass": 0.5, "Ground": 2, "Rock": 2, "Dragon": 0.5 },
            "Electric": { "Water": 2, "Electric": 0.5, "Grass": 0.5, "Ground": 0, "Flying": 2, "Dragon": 0.5 },
            "Grass": { "Fire": 0.5, "Water": 2, "Grass": 0.5, "Poison": 0.5, "Ground": 2, "Flying": 0.5, "Bug": 0.5, "Rock": 2, "Dragon": 0.5, "Steel": 0.5 },
            "Ice": { "Fire": 0.5, "Water": 0.5, "Grass": 2, "Ice": 0.5, "Ground": 2, "Flying": 2, "Dragon": 2, "Steel": 0.5 },
            "Fighting": { "Normal": 2, "Ice": 2, "Poison": 0.5, "Flying": 0.5, "Psychic": 0.5, "Bug": 0.5, "Rock": 2, "Ghost": 0, "Dark": 2, "Steel": 2, "Fairy": 0.5 },
            "Poison": { "Grass": 2, "Poison": 0.5, "Ground": 0.5, "Rock": 0.5, "Ghost": 0.5, "Steel": 0, "Fairy": 2 },
            "Ground": { "Fire": 2, "Electric": 2, "Grass": 0.5, "Poison": 2, "Flying": 0, "Bug": 0.5, "Rock": 2, "Steel": 2 },
            "Flying": { "Electric": 0.5, "Grass": 2, "Fighting": 2, "Bug": 2, "Rock": 0.5, "Steel": 0.5 },
            "Psychic": { "Fighting": 2, "Poison": 2, "Psychic": 0.5, "Dark": 0, "Steel": 0.5 },
            "Bug": { "Fire": 0.5, "Grass": 2, "Fighting": 0.5, "Poison": 0.5, "Flying": 0.5, "Psychic": 2, "Ghost": 0.5, "Dark": 2, "Steel": 0.5, "Fairy": 0.5 },
            "Rock": { "Fire": 2, "Ice": 2, "Fighting": 0.5, "Ground": 0.5, "Flying": 2, "Bug": 2, "Steel": 0.5 },
            "Ghost": { "Normal": 0, "Psychic": 2, "Ghost": 2, "Dark": 0.5 },
            "Dragon": { "Dragon": 2, "Steel": 0.5, "Fairy": 0 },
            "Dark": { "Fighting": 0.5, "Psychic": 2, "Ghost": 2, "Dark": 0.5, "Fairy": 0.5 },
            "Steel": { "Fire": 0.5, "Water": 0.5, "Electric": 0.5, "Ice": 2, "Rock": 2, "Steel": 0.5, "Fairy": 2 },
            "Fairy": { "Fire": 0.5, "Fighting": 2, "Poison": 0.5, "Dragon": 2, "Dark": 2, "Steel": 0.5 }
        };

        const typeNames = {
            "Normal": { zh: "一般", en: "Normal", class: "type-normal" },
            "Fire": { zh: "火", en: "Fire", class: "type-fire" },
            "Water": { zh: "水", en: "Water", class: "type-water" },
            "Electric": { zh: "电", en: "Electric", class: "type-electric" },
            "Grass": { zh: "草", en: "Grass", class: "type-grass" },
            "Ice": { zh: "冰", en: "Ice", class: "type-ice" },
            "Fighting": { zh: "格斗", en: "Fighting", class: "type-fighting" },
            "Poison": { zh: "毒", en: "Poison", class: "type-poison" },
            "Ground": { zh: "地面", en: "Ground", class: "type-ground" },
            "Flying": { zh: "飞行", en: "Flying", class: "type-flying" },
            "Psychic": { zh: "超能", en: "Psychic", class: "type-psychic" },
            "Bug": { zh: "虫", en: "Bug", class: "type-bug" },
            "Rock": { zh: "岩石", en: "Rock", class: "type-rock" },
            "Ghost": { zh: "幽灵", en: "Ghost", class: "type-ghost" },
            "Dragon": { zh: "龙", en: "Dragon", class: "type-dragon" },
            "Dark": { zh: "恶", en: "Dark", class: "type-dark" },
            "Steel": { zh: "钢", en: "Steel", class: "type-steel" },
            "Fairy": { zh: "妖精", en: "Fairy", class: "type-fairy" }
        };

        const i18n = {
            zh: {
                title: "宝可梦属性相克表",
                selectType: "选择属性组合",
                selected: "已选择:",
                noneSelected: "未选择",
                clear: "清除",
                exportImage: "📷 导出为图片",
                abilityTitle: "特性效果 (改变防御倍率)",
                abilityInfo: "点击按钮切换属性对防御方的伤害倍率",
                offense: "进攻端",
                superEffective: "(输出克制)",
                defense: "防守端",
                resistance: "(抗性)",
                superEffectiveLabel: "效果拔群",
                notEffectiveLabel: "效果不好",
                weaknessLabel: "弱点",
                resistanceLabel: "抗性",
                immuneLabel: "免疫",
                empty: "无",
                multiplier4: "(4倍)",
                multiplier2: "(x2)",
                multiplier05: "(x1/2)",
                multiplier025: "(1/4)",
                multiplier0: "(x0)"
            },
            en: {
                title: "Pokémon Type Chart",
                selectType: "Select Type Combination",
                selected: "Selected:",
                noneSelected: "None",
                clear: "Clear",
                exportImage: "📷 Export Image",
                abilityTitle: "Ability Effects (Change Defense Multiplier)",
                abilityInfo: "Click buttons to toggle damage multiplier",
                offense: "Offense",
                superEffective: "(Super Effective)",
                defense: "Defense",
                resistance: "(Resistance)",
                superEffectiveLabel: "Super Effective",
                notEffectiveLabel: "Not Very Effective",
                weaknessLabel: "Weakness",
                resistanceLabel: "Resistance",
                immuneLabel: "Immune",
                empty: "None",
                multiplier4: "(x4)",
                multiplier2: "(x2)",
                multiplier05: "(x1/2)",
                multiplier025: "(x1/4)",
                multiplier0: "(x0)"
            }
        };

        let currentLang = 'zh';
        let selectedTypes = [];
        let abilityEffects = {}; // 存储特性效果 {type: multiplier}

        function init() {
            renderTypeButtons();
            renderAbilityControls();
            updateDisplay();
        }

        function renderTypeButtons() {
            const container1 = document.getElementById('typeButtons1');
            const container2 = document.getElementById('typeButtons2');
            container1.innerHTML = '';
            container2.innerHTML = '';
            
            Object.keys(typeNames).forEach((type, index) => {
                const btn1 = createTypeButton(type, 1);
                const btn2 = createTypeButton(type, 2);
                container1.appendChild(btn1);
                container2.appendChild(btn2);
            });
        }

        function createTypeButton(type, group) {
            const btn = document.createElement('button');
            btn.className = `type-btn ${typeNames[type].class}`;
            if (group === 2) btn.classList.add('secondary');
            btn.textContent = typeNames[type][currentLang];
            btn.onclick = () => selectType(type, group);
            return btn;
        }

        function renderAbilityControls() {
            const container = document.getElementById('abilityControls');
            container.innerHTML = '';
            
            Object.keys(typeNames).forEach(type => {
                const item = document.createElement('div');
                item.className = 'ability-item';
                
                const typeSpan = document.createElement('span');
                typeSpan.className = `ability-type ${typeNames[type].class}`;
                typeSpan.textContent = typeNames[type][currentLang];
                
                const buttonsDiv = document.createElement('div');
                buttonsDiv.className = 'ability-buttons';
                
                ['x2', 'x1/2', 'x0'].forEach(multiplier => {
                    const btn = document.createElement('button');
                    btn.className = 'ability-btn';
                    btn.textContent = multiplier;
                    btn.onclick = () => toggleAbility(type, multiplier, btn);
                    buttonsDiv.appendChild(btn);
                });
                
                item.appendChild(typeSpan);
                item.appendChild(buttonsDiv);
                container.appendChild(item);
            });
        }

        function toggleAbility(type, multiplier, btn) {
            const key = `${type}-${multiplier}`;
            const btnContainer = btn.parentElement;
            
            // 清除该类型的其他选择
            btnContainer.querySelectorAll('.ability-btn').forEach(b => {
                b.className = 'ability-btn';
            });
            
            if (abilityEffects[type] === multiplier) {
                // 取消选择
                delete abilityEffects[type];
            } else {
                // 选择新的
                abilityEffects[type] = multiplier;
                if (multiplier === 'x2') btn.classList.add('active-x2');
                else if (multiplier === 'x1/2') btn.classList.add('active-x05');
                else if (multiplier === 'x0') btn.classList.add('active-x0');
            }
            
            updateDisplay();
        }

        function selectType(type, group) {
            if (group === 1) {
                if (selectedTypes[0] === type) {
                    selectedTypes[0] = null;
                } else {
                    selectedTypes[0] = type;
                }
            } else {
                if (selectedTypes[1] === type) {
                    selectedTypes[1] = null;
                } else if (selectedTypes[0] !== type) {
                    selectedTypes[1] = type;
                }
            }
            
            // 重新渲染按钮状态
            renderTypeButtons();
            selectedTypes.forEach((t, i) => {
                if (t) {
                    const container = i === 0 ? document.getElementById('typeButtons1') : document.getElementById('typeButtons2');
                    const buttons = container.querySelectorAll('.type-btn');
                    buttons.forEach(btn => {
                        if (btn.textContent === typeNames[t][currentLang]) {
                            btn.classList.add('selected');
                        }
                    });
                }
            });
            
            updateDisplay();
        }

        function clearTypes() {
            selectedTypes = [];
            abilityEffects = {};
            renderTypeButtons();
            renderAbilityControls();
            updateDisplay();
        }

        function updateDisplay() {
            // 更新已选择显示
            const type1Div = document.getElementById('selectedType1');
            const type2Div = document.getElementById('selectedType2');
            const plusSign = document.getElementById('plusSign');
            const noneSelected = document.getElementById('noneSelected');
            
            if (selectedTypes.length === 0 || (!selectedTypes[0] && !selectedTypes[1])) {
                type1Div.style.display = 'none';
                type2Div.style.display = 'none';
                plusSign.style.display = 'none';
                noneSelected.style.display = 'inline';
            } else {
                noneSelected.style.display = 'none';
                
                if (selectedTypes[0]) {
                    type1Div.style.display = 'block';
                    type1Div.className = `selected-type ${typeNames[selectedTypes[0]].class}`;
                    type1Div.textContent = typeNames[selectedTypes[0]][currentLang];
                } else {
                    type1Div.style.display = 'none';
                }
                
                if (selectedTypes[1]) {
                    type2Div.style.display = 'block';
                    type2Div.className = `selected-type ${typeNames[selectedTypes[1]].class}`;
                    type2Div.textContent = typeNames[selectedTypes[1]][currentLang];
                    plusSign.style.display = 'inline';
                } else {
                    type2Div.style.display = 'none';
                    plusSign.style.display = 'none';
                }
            }
            
            // 计算并显示进攻端
            updateOffense();
            
            // 计算并显示防守端
            updateDefense();
        }

        function updateOffense() {
            const offenseSuper = document.getElementById('offenseSuper');
            const offenseNot = document.getElementById('offenseNot');
            
            offenseSuper.innerHTML = '';
            offenseNot.innerHTML = '';
            
            if (!selectedTypes[0] && !selectedTypes[1]) {
                offenseSuper.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
                offenseNot.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
                return;
            }
            
            const superEffective = new Set();
            const notEffective = new Set();
            
            selectedTypes.forEach(type => {
                if (!type || !typeData[type]) return;
                
                Object.entries(typeData[type]).forEach(([defType, multiplier]) => {
                    if (multiplier === 2) superEffective.add(defType);
                    else if (multiplier === 0.5) notEffective.add(defType);
                    else if (multiplier === 0) notEffective.add(defType);
                });
            });
            
            // 排除重复
            superEffective.forEach(type => {
                if (notEffective.has(type)) notEffective.delete(type);
            });
            
            if (superEffective.size === 0) {
                offenseSuper.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
            } else {
                superEffective.forEach(type => {
                    offenseSuper.appendChild(createTypeTag(type));
                });
            }
            
            if (notEffective.size === 0) {
                offenseNot.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
            } else {
                notEffective.forEach(type => {
                    offenseNot.appendChild(createTypeTag(type));
                });
            }
        }

        function updateDefense() {
            const defenseWeak = document.getElementById('defenseWeak');
            const defenseResist = document.getElementById('defenseResist');
            const defenseImmune = document.getElementById('defenseImmune');
            
            defenseWeak.innerHTML = '';
            defenseResist.innerHTML = '';
            defenseImmune.innerHTML = '';
            
            if (!selectedTypes[0] && !selectedTypes[1]) {
                defenseWeak.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
                defenseResist.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
                defenseImmune.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
                return;
            }
            
            const weaknesses = {};
            const resistances = {};
            const immunities = {};
            
            Object.keys(typeNames).forEach(attackType => {
                let multiplier = 1;
                
                selectedTypes.forEach(defType => {
                    if (!defType) return;
                    const data = typeData[attackType];
                    if (data && data[defType] !== undefined) {
                        multiplier *= data[defType];
                    }
                });
                
                // 应用特性效果
                if (abilityEffects[attackType]) {
                    if (abilityEffects[attackType] === 'x0') multiplier = 0;
                    else if (abilityEffects[attackType] === 'x1/2') multiplier *= 0.5;
                    else if (abilityEffects[attackType] === 'x2') multiplier *= 2;
                }
                
                if (multiplier === 0) {
                    immunities[attackType] = multiplier;
                } else if (multiplier > 1) {
                    weaknesses[attackType] = multiplier;
                } else if (multiplier < 1) {
                    resistances[attackType] = multiplier;
                }
            });
            
            // 更新标签
            document.getElementById('weaknessLabel').textContent = 
                `${i18n[currentLang].weaknessLabel} ${Object.keys(weaknesses).length > 0 ? `(${Object.keys(weaknesses).length})` : ''}`;
            document.getElementById('resistanceLabel').textContent = 
                `${i18n[currentLang].resistanceLabel} ${Object.keys(resistances).length > 0 ? `(${Object.keys(resistances).length})` : ''}`;
            document.getElementById('immuneLabel').textContent = 
                `${i18n[currentLang].immuneLabel} ${Object.keys(immunities).length > 0 ? `(${Object.keys(immunities).length})` : ''}`;
            
            if (Object.keys(weaknesses).length === 0) {
                defenseWeak.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
            } else {
                Object.entries(weaknesses).forEach(([type, mult]) => {
                    defenseWeak.appendChild(createTypeTagWithMultiplier(type, mult));
                });
            }
            
            if (Object.keys(resistances).length === 0) {
                defenseResist.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
            } else {
                Object.entries(resistances).forEach(([type, mult]) => {
                    defenseResist.appendChild(createTypeTagWithMultiplier(type, mult));
                });
            }
            
            if (Object.keys(immunities).length === 0) {
                defenseImmune.innerHTML = `<span class="empty-msg">${i18n[currentLang].empty}</span>`;
            } else {
                Object.entries(immunities).forEach(([type, mult]) => {
                    defenseImmune.appendChild(createTypeTagWithMultiplier(type, mult));
                });
            }
        }

        function createTypeTag(type) {
            const tag = document.createElement('span');
            tag.className = `type-tag ${typeNames[type].class}`;
            tag.textContent = typeNames[type][currentLang];
            return tag;
        }

        function createTypeTagWithMultiplier(type, multiplier) {
            const tag = document.createElement('span');
            tag.className = `type-tag ${typeNames[type].class}`;
            
            let multText = '';
            if (multiplier === 4) multText = i18n[currentLang].multiplier4;
            else if (multiplier === 2) multText = i18n[currentLang].multiplier2;
            else if (multiplier === 0.5) multText = i18n[currentLang].multiplier05;
            else if (multiplier === 0.25) multText = i18n[currentLang].multiplier025;
            else if (multiplier === 0) multText = i18n[currentLang].multiplier0;
            
            tag.innerHTML = `${typeNames[type][currentLang]}<span class="multiplier">${multText}</span>`;
            return tag;
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // 更新所有i18n文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            
            renderTypeButtons();
            renderAbilityControls();
            
            // 恢复按钮选中状态
            selectedTypes.forEach((t, i) => {
                if (t) {
                    const container = i === 0 ? document.getElementById('typeButtons1') : document.getElementById('typeButtons2');
                    const buttons = container.querySelectorAll('.type-btn');
                    buttons.forEach(btn => {
                        if (btn.textContent === typeNames[t][currentLang]) {
                            btn.classList.add('selected');
                        }
                    });
                }
            });
            
            // 恢复特性按钮状态
            Object.entries(abilityEffects).forEach(([type, multiplier]) => {
                const items = document.querySelectorAll('.ability-item');
                items.forEach(item => {
                    const typeSpan = item.querySelector('.ability-type');
                    if (typeSpan.textContent === typeNames[type][currentLang]) {
                        const buttons = item.querySelectorAll('.ability-btn');
                        buttons.forEach(btn => {
                            if (btn.textContent === multiplier) {
                                if (multiplier === 'x2') btn.classList.add('active-x2');
                                else if (multiplier === 'x1/2') btn.classList.add('active-x05');
                                else if (multiplier === 'x0') btn.classList.add('active-x0');
                            }
                        });
                    }
                });
            });
            
            updateDisplay();
        }

        // 导出图片功能
        function exportToImage() {
            const exportBtn = document.querySelector('.export-btn');
            const originalText = exportBtn.textContent;
            exportBtn.textContent = currentLang === 'zh' ? '生成中...' : 'Generating...';
            exportBtn.disabled = true;
            
            // 获取需要导出的区域（不包括选择器和特性部分，只导出结果）
            const offenseSection = document.querySelector('.section.offense');
            const defenseSection = document.querySelector('.section.defense');
            
            // 创建临时容器
            const tempContainer = document.createElement('div');
            tempContainer.style.cssText = `
                background: #f0f0f0;
                padding: 12px;
                border-radius: 12px;
                width: 900px;
                box-sizing: border-box;
            `;
            
            // 克隆内容
            const offenseClone = offenseSection.cloneNode(true);
            const defenseClone = defenseSection.cloneNode(true);
            
            // 更新所有标签为当前语言
            const updateCategoryLabels = (section) => {
                const categories = section.querySelectorAll('.category');
                categories.forEach(cat => {
                    const label = cat.querySelector('.category-label');
                    if (cat.classList.contains('super-effective')) {
                        label.textContent = i18n[currentLang].superEffectiveLabel;
                    } else if (cat.classList.contains('not-effective')) {
                        label.textContent = i18n[currentLang].notEffectiveLabel;
                    } else if (cat.classList.contains('weakness')) {
                        label.textContent = i18n[currentLang].weaknessLabel;
                    } else if (cat.classList.contains('resistance')) {
                        label.textContent = i18n[currentLang].resistanceLabel;
                    } else if (cat.classList.contains('immune')) {
                        label.textContent = i18n[currentLang].immuneLabel;
                    }
                });
                
                // 更新 empty-msg 文本
                const emptyMsgs = section.querySelectorAll('.empty-msg');
                emptyMsgs.forEach(msg => {
                    msg.textContent = i18n[currentLang].empty;
                });
            };
            
            updateCategoryLabels(offenseClone);
            updateCategoryLabels(defenseClone);
            
            // 为表格行添加淡色背景（所有行都有颜色）
            const addRowBackground = (section, color) => {
                const categories = section.querySelectorAll('.category');
                categories.forEach((cat) => {
                    cat.style.background = color;
                    cat.style.boxShadow = '0 2px 4px rgba(0,0,0,0.08)';
                    cat.style.marginBottom = '12px';
                });
            };
            
            // 使用更深的颜色
            addRowBackground(offenseClone, '#fff5e6');
            addRowBackground(defenseClone, '#e6f3ff');
            
            // 为section添加淡色边框和背景
            offenseClone.style.border = 'none';
            offenseClone.style.background = '#fff';
            offenseClone.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
            offenseClone.style.marginBottom = '6px';
            defenseClone.style.border = 'none';
            defenseClone.style.background = '#fff';
            defenseClone.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
            defenseClone.style.marginBottom = '0';
            
            tempContainer.appendChild(offenseClone);
            tempContainer.appendChild(defenseClone);
            
            document.body.appendChild(tempContainer);
            
            html2canvas(tempContainer, {
                backgroundColor: '#e8e8e8',
                scale: 2,
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                // 下载图片
                const link = document.createElement('a');
                link.download = `pokemon-type-chart-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // 清理
                document.body.removeChild(tempContainer);
                exportBtn.textContent = originalText;
                exportBtn.disabled = false;
            }).catch(err => {
                console.error('Export failed:', err);
                alert(currentLang === 'zh' ? '导出失败，请重试' : 'Export failed, please try again');
                document.body.removeChild(tempContainer);
                exportBtn.textContent = originalText;
                exportBtn.disabled = false;
            });
        }

        // 初始化
        init();
    </script>
</body>
</html>
