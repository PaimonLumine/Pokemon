        .lang-switch {

            margin-bottom: 25px;
        }
        
        .lang-switch button {
            padding: 10px 24px;
            margin: 0 5px;
            border: 2px solid #4CAF50;
            background: white;
            color: #4CAF50;
            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .lang-switch button.active {
            background: #4CAF50;
            color: white;
        }
        
        .export-section {
            text-align: center;
            padding: 20px 0;
        }
        
        .export-btn {

            font-weight: bold;

            transition: all 0.3s;
        }
        
        .export-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .export-btn:active {
            transform: translateY(0);
        }
        
        .type-selector {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .selector-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }
        
        .type-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .type-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .type-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .type-btn.selected {
            box-shadow: 0 0 0 3px white, 0 0 0 5px #333;

        .type-btn.secondary {
            opacity: 0.7;
        }
        
        .type-btn.secondary.selected {
            opacity: 1;
        }
        
        .selected-types {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }
        
        .selected-type {
            padding: 12px 30px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);

        .plus-sign {
            font-size: 32px;

        }
        
        .clear-btn {

            border-radius: 22px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .clear-btn:hover {
            background: #ff5252;
        }
        
        /* 紧凑表格样式 */
        .compact-table {
            width: auto;
            border-collapse: collapse;
            font-size: 15px;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            table-layout: fixed;
        }
        
        .compact-table th,
        .compact-table td {
            padding: 0;
            text-align: center;
            border: 1px solid #000;
            vertical-align: middle;
            height: 24px;
        }
        
        .compact-table th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }
        
        .compact-table .row-header {

        .compact-table .row-header.defense {

        .compact-table .category-label-cell {

        .compact-table .category-label-cell.super,
        .compact-table .category-label-cell.not-effective,
        .compact-table .category-label-cell.weak,
        .compact-table .category-label-cell.resist,
        .compact-table .category-label-cell.immune {
            background: #ffffff;
            color: #000000;
        }
        
        /* 属性单元格 - 每个属性独立单元格 */
        .compact-table .type-cell {
            width: 40px;

            max-width: 40px;
            height: 36px;
            min-height: 36px;
            max-height: 36px;
            padding: 0;
            border: 1px solid #000;
            text-align: center;
            vertical-align: middle;
            color: white !important;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);

            overflow: hidden;
        }
        
        .compact-table .type-cell .type-text {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;

        .compact-table .type-cell.circle .type-text {
            border: 2px solid white;
            border-radius: 50%;
            padding: 2px 5px;
            display: inline-block;
            line-height: 1;
        }
        
        /* 复合属性单元格样式 - 双色背景 */
        .compact-table .dual-type-cell {
            width: 70px;
            min-width: 70px;
            max-width: 70px;
            height: 36px;
            min-height: 36px;
            max-height: 36px;
            padding: 0;
            border: 1px solid #000;
            text-align: center;
            vertical-align: middle;
            color: white !important;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);

            overflow: hidden;
            position: relative;
        }
        
        .compact-table .dual-type-cell .type-text {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        
        /* 复合属性双色背景 */
        .dual-type-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .dual-type-bg .bg-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
        }
        
        .dual-type-bg .bg-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
        }

            border: 1px solid #000;
            width: auto;
            min-width: 100px;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;

            font-weight: bold;

        .ability-buttons {

        .ability-btn {

            font-size: 14px;
            font-weight: bold;

        .ability-btn:hover {

        .ability-btn.active-x2 {

        .ability-btn.active-x05 {

        .info-text {

        /* 颜色定义 */
        .type-normal { background: #A8A878; }
        .type-fire { background: #F08030; }

        .type-electric { background: #F8D030; }

<body>
    <div class="container">
        <h1 data-i18n="title">宝可梦属性相克表</h1>
        
        <div class="lang-switch">
            <button class="active" onclick="setLanguage('zh')" id="btn-zh">中文</button>
            <button onclick="setLanguage('en')" id="btn-en">English</button>
        </div>
        
        <div class="type-selector">
            <div class="selector-title">
                <span data-i18n="selectType">选择属性组合</span>
            </div>
            <div class="type-buttons" id="typeButtons1"></div>
            <div class="type-buttons" id="typeButtons2"></div>
            <div class="selected-types">
                <span data-i18n="selected">已选择:</span>
                <div id="selectedType1" class="selected-type" style="display:none"></div>
                <span id="plusSign" class="plus-sign" style="display:none">+</span>
                <div id="selectedType2" class="selected-type" style="display:none"></div>
                <span id="noneSelected" data-i18n="noneSelected">未选择</span>
                <button class="clear-btn" onclick="clearTypes()" data-i18n="clear">清除</button>
            </div>
        </div>
        
        <div class="ability-section">
            <div class="ability-title" data-i18n="abilityTitle">特性效果 (改变防御倍率)</div>
            <div class="ability-controls" id="abilityControls"></div>
            <div class="info-text" data-i18n="abilityInfo">点击按钮切换属性对防御方的伤害倍率</div>
        </div>
        
        <div class="section offense">
            <div class="section-content">
                <table class="compact-table">
                    <tbody id="offenseTableBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="section defense">
            <div class="section-content">
                <table class="compact-table">
                    <tbody id="defenseTableBody">

                </table>

        </div>
        
        <div class="section blindspot">
            <div class="section-content">
                <table class="compact-table">
                    <tbody id="blindspotTableBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="export-section" style="margin-top: 20px;">
            <button class="export-btn blindspot-export" onclick="exportBlindspotToImage()" style="background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); margin-bottom: 15px;">
                📷 导出复合属性盲点表

        <div class="export-section" style="margin-top: 30px;">
            <button class="export-btn" onclick="exportToImage()" data-i18n="exportImage">

            </button>
        </div>
    </div>

    <script>
        // 数据定义

            "Bug": { "Fire": 0.5, "Grass": 2, "Fighting": 0.5, "Poison": 0.5, "Flying": 0.5, "Psychic": 2, "Ghost": 0.5, "Dark": 2, "Steel": 0.5, "Fairy": 0.5 },
            "Rock": { "Fire": 2, "Ice": 2, "Fighting": 0.5, "Ground": 0.5, "Flying": 2, "Bug": 2, "Steel": 0.5 },
            "Ghost": { "Normal": 0, "Psychic": 2, "Ghost": 2, "Dark": 0.5 },
            "Dragon": { "Dragon": 2, "Steel": 0.5, "Fairy": 0 },
            "Dark": { "Fighting": 0.5, "Psychic": 2, "Ghost": 2, "Dark": 0.5, "Fairy": 0.5 },
            "Steel": { "Fire": 0.5, "Water": 0.5, "Electric": 0.5, "Ice": 2, "Rock": 2, "Steel": 0.5, "Fairy": 2 },
            "Fairy": { "Fire": 0.5, "Fighting": 2, "Poison": 0.5, "Dragon": 2, "Dark": 2, "Steel": 0.5 }
        };

        const typeNames = {
            "Normal": { zh: "普", en: "Normal", class: "type-normal", color: "#A8A878" },
            "Fire": { zh: "火", en: "Fire", class: "type-fire", color: "#ff4422" },
            "Water": { zh: "水", en: "Water", class: "type-water", color: "#3498ff" },
            "Electric": { zh: "电", en: "Electric", class: "type-electric", color: "#F8D030" },
            "Grass": { zh: "草", en: "Grass", class: "type-grass", color: "#78C850" },
            "Ice": { zh: "冰", en: "Ice", class: "type-ice", color: "#98D8D8" },
            "Fighting": { zh: "斗", en: "Fighting", class: "type-fighting", color: "#bb5543" },
            "Poison": { zh: "毒", en: "Poison", class: "type-poison", color: "#A040A0" },
            "Ground": { zh: "地", en: "Ground", class: "type-ground", color: "#E0C068" },
            "Flying": { zh: "飞", en: "Flying", class: "type-flying", color: "#6698ff" },
            "Psychic": { zh: "超", en: "Psychic", class: "type-psychic", color: "#F85888" },
            "Bug": { zh: "虫", en: "Bug", class: "type-bug", color: "#A8B820" },
            "Rock": { zh: "岩", en: "Rock", class: "type-rock", color: "#B8A038" },
            "Ghost": { zh: "幽", en: "Ghost", class: "type-ghost", color: "#705898" },
            "Dragon": { zh: "龙", en: "Dragon", class: "type-dragon", color: "#7038F8" },
            "Dark": { zh: "恶", en: "Dark", class: "type-dark", color: "#705848" },
            "Steel": { zh: "钢", en: "Steel", class: "type-steel", color: "#B8B8D0" },
            "Fairy": { zh: "妖", en: "Fairy", class: "type-fairy", color: "#feaafe" }
        };

        const i18n = {
            zh: {
                title: "宝可梦属性相克表",
                selectType: "选择属性组合",
                selected: "已选择:",
                noneSelected: "未选择",
                clear: "清除",
                exportImage: "📷 导出为图片",
                abilityTitle: "特性效果 (改变防御倍率)",
                abilityInfo: "点击按钮切换属性对防御方的伤害倍率",
                offense: "进攻端",
                superEffective: "(输出克制)",
                defense: "防守端",
                resistance: "(抗性)",
                superEffectiveLabel: "效果拔群",
                notEffectiveLabel: "效果不好",
                weaknessLabel: "弱点",
                resistanceLabel: "抵抗",
                immuneLabel: "免疫",
                empty: "无",
                multiplier4: "×4",
                multiplier2: "×2",
                multiplier05: "×1/2",
                multiplier025: "×1/4",
                multiplier0: "×0"
            },
            en: {
                title: "Pokémon Type Chart",
                selectType: "Select Type Combination",
                selected: "Selected:",
                noneSelected: "None",
                clear: "Clear",
                exportImage: "📷 Export Image",
                abilityTitle: "Ability Effects (Change Defense Multiplier)",
                abilityInfo: "Click buttons to toggle damage multiplier",
                offense: "Offense",
                superEffective: "(Super Effective)",
                defense: "Defense",
                resistance: "(Resistance)",
                superEffectiveLabel: "Super Effective",
                notEffectiveLabel: "Not Very Effective",
                weaknessLabel: "Weakness",
                resistanceLabel: "Resistance",
                immuneLabel: "Immune",
                empty: "None",
                multiplier4: "×4",
                multiplier2: "×2",
                multiplier05: "×1/2",
                multiplier025: "×1/4",
                multiplier0: "×0"
            }
        };

        let currentLang = 'zh';
        let selectedTypes = [];
        let abilityEffects = {}; // 存储特性效果 {type: multiplier}

        function init() {
            renderTypeButtons();
            renderAbilityControls();
            updateDisplay();
        }

        function renderTypeButtons() {
            const container1 = document.getElementById('typeButtons1');
            const container2 = document.getElementById('typeButtons2');
            container1.innerHTML = '';
            container2.innerHTML = '';
            
            Object.keys(typeNames).forEach((type, index) => {
                const btn1 = createTypeButton(type, 1);
                const btn2 = createTypeButton(type, 2);
                container1.appendChild(btn1);
                container2.appendChild(btn2);
            });
        }

        function createTypeButton(type, group) {
            const btn = document.createElement('button');
            btn.className = `type-btn ${typeNames[type].class}`;
            if (group === 2) btn.classList.add('secondary');
            btn.textContent = typeNames[type][currentLang];
            btn.onclick = () => selectType(type, group);
            return btn;
        }

        function renderAbilityControls() {
            const container = document.getElementById('abilityControls');
            container.innerHTML = '';
            
            Object.keys(typeNames).forEach(type => {
                const item = document.createElement('div');
                item.className = 'ability-item';
                
                const typeSpan = document.createElement('span');
                typeSpan.className = `ability-type ${typeNames[type].class}`;
                typeSpan.textContent = typeNames[type][currentLang];
                
                const buttonsDiv = document.createElement('div');
                buttonsDiv.className = 'ability-buttons';
                
                ['x2', 'x1/2', 'x0'].forEach(multiplier => {
                    const btn = document.createElement('button');
                    btn.className = 'ability-btn';
                    btn.textContent = multiplier;
                    btn.onclick = () => toggleAbility(type, multiplier, btn);
                    buttonsDiv.appendChild(btn);
                });
                
                item.appendChild(typeSpan);
                item.appendChild(buttonsDiv);
                container.appendChild(item);
            });
        }

        function toggleAbility(type, multiplier, btn) {
            const key = `${type}-${multiplier}`;
            const btnContainer = btn.parentElement;
            
            // 清除该类型的其他选择
            btnContainer.querySelectorAll('.ability-btn').forEach(b => {
                b.className = 'ability-btn';
            });
            
            if (abilityEffects[type] === multiplier) {
                // 取消选择
                delete abilityEffects[type];
            } else {
                // 选择新的
                abilityEffects[type] = multiplier;
                if (multiplier === 'x2') btn.classList.add('active-x2');
                else if (multiplier === 'x1/2') btn.classList.add('active-x05');
                else if (multiplier === 'x0') btn.classList.add('active-x0');
            }
            
            updateDisplay();
        }

        function selectType(type, group) {
            if (group === 1) {
                if (selectedTypes[0] === type) {
                    selectedTypes[0] = null;
                } else {
                    selectedTypes[0] = type;
                }
            } else {
                if (selectedTypes[1] === type) {
                    selectedTypes[1] = null;
                } else if (selectedTypes[0] !== type) {
                    selectedTypes[1] = type;
                }
            }
            
            // 重新渲染按钮状态
            renderTypeButtons();
            selectedTypes.forEach((t, i) => {
                if (t) {
                    const container = i === 0 ? document.getElementById('typeButtons1') : document.getElementById('typeButtons2');
                    const buttons = container.querySelectorAll('.type-btn');
                    buttons.forEach(btn => {
                        if (btn.textContent === typeNames[t][currentLang]) {
                            btn.classList.add('selected');
                        }
                    });
                }
            });
            
            updateDisplay();
        }

        function clearTypes() {
            selectedTypes = [];
            abilityEffects = {};
            renderTypeButtons();
            renderAbilityControls();
            updateDisplay();
        }

        function updateDisplay() {
            // 更新已选择显示
            const type1Div = document.getElementById('selectedType1');
            const type2Div = document.getElementById('selectedType2');
            const plusSign = document.getElementById('plusSign');
            const noneSelected = document.getElementById('noneSelected');
            
            if (selectedTypes.length === 0 || (!selectedTypes[0] && !selectedTypes[1])) {
                type1Div.style.display = 'none';
                type2Div.style.display = 'none';
                plusSign.style.display = 'none';
                noneSelected.style.display = 'inline';
            } else {
                noneSelected.style.display = 'none';
                
                if (selectedTypes[0]) {
                    type1Div.style.display = 'block';
                    type1Div.className = `selected-type ${typeNames[selectedTypes[0]].class}`;
                    type1Div.textContent = typeNames[selectedTypes[0]][currentLang];
                } else {
                    type1Div.style.display = 'none';
                }
                
                if (selectedTypes[1]) {
                    type2Div.style.display = 'block';
                    type2Div.className = `selected-type ${typeNames[selectedTypes[1]].class}`;
                    type2Div.textContent = typeNames[selectedTypes[1]][currentLang];
                    plusSign.style.display = 'inline';
                } else {
                    type2Div.style.display = 'none';
                    plusSign.style.display = 'none';
                }
            }
            
            // 计算并显示进攻端
            updateOffense();
            
            // 计算并显示防守端
            updateDefense();
        }

        function updateOffense() {
            const tbody = document.getElementById('offenseTableBody');
            tbody.innerHTML = '';
            
            const hasSelection = selectedTypes[0] || selectedTypes[1];
            
            // 计算数据
            const superEffective = new Set();
            const notEffective = new Set();
            
            if (hasSelection) {
                Object.keys(typeNames).forEach(defType => {
                    let maxMultiplier = 0;
                    
                    selectedTypes.forEach(type => {
                        if (!type) return;
                        const data = typeData[type];
                        const multiplier = (data && data[defType] !== undefined) ? data[defType] : 1;
                        maxMultiplier = Math.max(maxMultiplier, multiplier);
                    });
                    
                    if (maxMultiplier === 2) {
                        superEffective.add(defType);
                    } else if (maxMultiplier === 0.5 || maxMultiplier === 0) {
                        notEffective.add(defType);
                    }
                });
            }
            
            // 生成效果拔群行
            const superRow = document.createElement('tr');
            let superHtml = `<td class="row-header offense" rowspan="2">${i18n[currentLang].offense}</td>`;
            superHtml += `<td class="category-label-cell super">${i18n[currentLang].superEffectiveLabel}</td>`;
            
            if (superEffective.size === 0) {
                superHtml += `<td class="type-cell" style="border: none; background: transparent;"></td>`;
            } else {
                superEffective.forEach(type => {
                    superHtml += `<td class="type-cell ${typeNames[type].class}"><span class="type-text">${typeNames[type][currentLang]}</span></td>`;
                });
            }
            superRow.innerHTML = superHtml;
            tbody.appendChild(superRow);
            
            // 生成效果不好行
            const notRow = document.createElement('tr');
            let notHtml = `<td class="category-label-cell not-effective">${i18n[currentLang].notEffectiveLabel}</td>`;
            
            if (notEffective.size === 0) {
                notHtml += `<td class="type-cell" style="border: none; background: transparent;"></td>`;
            } else {
                notEffective.forEach(type => {
                    notHtml += `<td class="type-cell ${typeNames[type].class}"><span class="type-text">${typeNames[type][currentLang]}</span></td>`;
                });
            }
            notRow.innerHTML = notHtml;
            tbody.appendChild(notRow);
            
            // 更新复合属性盲点表格
            updateBlindspot();
        }

        function updateBlindspot() {
            const tbody = document.getElementById('blindspotTableBody');
            tbody.innerHTML = '';
            
            const hasSelection = selectedTypes[0] || selectedTypes[1];
            
            if (!hasSelection) {
                // 空状态
                tbody.innerHTML = `
                    <tr>
                        <td class="row-header blindspot" rowspan="1">盲点</td>
                        <td class="category-label-cell">0</td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                        <td class="type-cell" style="border: none; background: transparent;"></td>
                    </tr>
                `;
                return;
            }
            
            const blindspots = [];
            
            // 遍历所有可能的双属性组合
            const types = Object.keys(typeNames);
            for (let i = 0; i < types.length; i++) {
                for (let j = i + 1; j < types.length; j++) {
                    const type1 = types[i];
                    const type2 = types[j];
                    
                    // 检查当前选择的攻击属性对这个双属性组合的伤害
                    let isBlindspot = true;
                    
                    selectedTypes.forEach(attackType => {
                        if (!attackType) return;
                        const data = typeData[attackType];
                        if (data) {
                            const mult1 = data[type1] !== undefined ? data[type1] : 1;
                            const mult2 = data[type2] !== undefined ? data[type2] : 1;
                            const totalMult = mult1 * mult2;
                            
                            // 如果伤害 > 0.5，则不是盲点
                            if (totalMult > 0.5) {
                                isBlindspot = false;
                            }
                        }
                    });
                    
                    if (isBlindspot && (selectedTypes[0] || selectedTypes[1])) {
                        blindspots.push({ type1, type2 });
                    }
                }
            }
            
            // 生成盲点表格（支持多行）
            const count = blindspots.length;
            const itemsPerRow = 10; // 每行显示10个
            
            if (count === 0) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="row-header blindspot" rowspan="1">盲点</td>
                    <td class="category-label-cell">${count}</td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                    <td class="type-cell" style="border: none; background: transparent;"></td>
                `;
                tbody.appendChild(row);
            } else {
                const totalRows = Math.ceil(count / itemsPerRow);
                
                for (let rowIndex = 0; rowIndex < totalRows; rowIndex++) {
                    const row = document.createElement('tr');
                    let html = '';
                    
                    // 第一行：显示标题和计数
                    if (rowIndex === 0) {
                        html += `<td class="row-header blindspot" rowspan="${totalRows}">盲点</td>`;
                        html += `<td class="category-label-cell" rowspan="${totalRows}">${count}</td>`;
                    }
                    
                    // 显示当前行的盲点
                    const startIdx = rowIndex * itemsPerRow;
                    const endIdx = Math.min(startIdx + itemsPerRow, count);
                    
                    for (let i = startIdx; i < endIdx; i++) {
                        const { type1, type2 } = blindspots[i];
                        const color1 = typeNames[type1].class;
                        const color2 = typeNames[type2].class;
                        html += `
                            <td class="dual-type-cell">
                                <div class="dual-type-bg">
                                    <div class="bg-left ${color1}"></div>
                                    <div class="bg-right ${color2}"></div>
                                </div>
                                <span class="type-text">${typeNames[type1][currentLang]}+${typeNames[type2][currentLang]}</span>
                            </td>
                        `;
                    }
                    
                    // 如果最后一行不满，添加占位单元格保持对齐
                    const itemsInThisRow = endIdx - startIdx;
                    if (itemsInThisRow < itemsPerRow && rowIndex === totalRows - 1) {
                        for (let i = 0; i < (itemsPerRow - itemsInThisRow); i++) {
                            html += `<td class="type-cell" style="border: none; background: transparent;"></td>`;
                        }
                    }
                    
                    row.innerHTML = html;
                    tbody.appendChild(row);
                }
            }
        }

        function updateDefense() {
            const tbody = document.getElementById('defenseTableBody');
            tbody.innerHTML = '';
            
            const hasSelection = selectedTypes[0] || selectedTypes[1];
            
            if (!hasSelection) {
                // 空状态
                tbody.innerHTML = `
                    <tr>
                        <td class="row-header defense" rowspan="3">${i18n[currentLang].defense}</td>
                        <td class="category-label-cell weak">${i18n[currentLang].weaknessLabel}</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td class="category-label-cell resist">${i18n[currentLang].resistanceLabel}</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td class="category-label-cell immune">${i18n[currentLang].immuneLabel}</td>
                        <td></td>
                    </tr>
                `;
                return;
            }
            
            const weaknesses = {};
            const resistances = {};
            const immunities = {};
            
            Object.keys(typeNames).forEach(attackType => {
                let multiplier = 1;
                
                selectedTypes.forEach(defType => {
                    if (!defType) return;
                    const data = typeData[attackType];
                    if (data && data[defType] !== undefined) {
                        multiplier *= data[defType];
                    }
                });
                
                // 应用特性效果
                if (abilityEffects[attackType]) {
                    if (abilityEffects[attackType] === 'x0') multiplier = 0;
                    else if (abilityEffects[attackType] === 'x1/2') multiplier *= 0.5;
                    else if (abilityEffects[attackType] === 'x2') multiplier *= 2;
                }
                
                if (multiplier === 0) {
                    immunities[attackType] = multiplier;
                } else if (multiplier > 1) {
                    weaknesses[attackType] = multiplier;
                } else if (multiplier < 1) {
                    resistances[attackType] = multiplier;
                }
            });
            
            // 生成弱点行
            const weakRow = document.createElement('tr');
            const weakCount = Object.keys(weaknesses).length;
            let weakHtml = `<td class="row-header defense" rowspan="3">${i18n[currentLang].defense}</td>`;
            weakHtml += `<td class="category-label-cell weak">${i18n[currentLang].weaknessLabel} ${weakCount}</td>`;
            
            if (weakCount === 0) {
                weakHtml += `<td class="type-cell" style="border: none; background: transparent;"></td>`;
            } else {
                Object.entries(weaknesses).forEach(([type, mult]) => {
                    const circleClass = mult === 4 ? 'circle' : '';
                    weakHtml += `<td class="type-cell ${typeNames[type].class} ${circleClass}"><span class="type-text">${typeNames[type][currentLang]}</span></td>`;
                });
            }
            weakRow.innerHTML = weakHtml;
            tbody.appendChild(weakRow);
            
            // 生成抗性行
            const resistRow = document.createElement('tr');
            const resistCount = Object.keys(resistances).length;
            let resistHtml = `<td class="category-label-cell resist">${i18n[currentLang].resistanceLabel} ${resistCount}</td>`;
            
            if (resistCount === 0) {
                resistHtml += `<td class="type-cell" style="border: none; background: transparent;"></td>`;
            } else {
                Object.entries(resistances).forEach(([type, mult]) => {
                    const circleClass = mult === 0.25 ? 'circle' : '';
                    resistHtml += `<td class="type-cell ${typeNames[type].class} ${circleClass}"><span class="type-text">${typeNames[type][currentLang]}</span></td>`;
                });
            }
            resistRow.innerHTML = resistHtml;
            tbody.appendChild(resistRow);
            
            // 生成免疫行
            const immuneRow = document.createElement('tr');
            const immuneCount = Object.keys(immunities).length;
            let immuneHtml = `<td class="category-label-cell immune">${i18n[currentLang].immuneLabel} ${immuneCount}</td>`;
            
            if (immuneCount === 0) {
                immuneHtml += `<td class="type-cell" style="border: none; background: transparent;"></td>`;
            } else {
                Object.keys(immunities).forEach(type => {
                    immuneHtml += `<td class="type-cell ${typeNames[type].class}"><span class="type-text">${typeNames[type][currentLang]}</span></td>`;
                });
            }
            immuneRow.innerHTML = immuneHtml;
            tbody.appendChild(immuneRow);
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // 更新所有i18n文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            
            renderTypeButtons();
            renderAbilityControls();
            
            // 恢复按钮选中状态
            selectedTypes.forEach((t, i) => {
                if (t) {
                    const container = i === 0 ? document.getElementById('typeButtons1') : document.getElementById('typeButtons2');
                    const buttons = container.querySelectorAll('.type-btn');
                    buttons.forEach(btn => {
                        if (btn.textContent === typeNames[t][currentLang]) {
                            btn.classList.add('selected');
                        }
                    });
                }
            });
            
            // 恢复特性按钮状态
            Object.entries(abilityEffects).forEach(([type, multiplier]) => {
                const items = document.querySelectorAll('.ability-item');
                items.forEach(item => {
                    const typeSpan = item.querySelector('.ability-type');
                    if (typeSpan.textContent === typeNames[type][currentLang]) {
                        const buttons = item.querySelectorAll('.ability-btn');
                        buttons.forEach(btn => {
                            if (btn.textContent === multiplier) {
                                if (multiplier === 'x2') btn.classList.add('active-x2');
                                else if (multiplier === 'x1/2') btn.classList.add('active-x05');
                                else if (multiplier === 'x0') btn.classList.add('active-x0');
                            }
                        });
                    }
                });
            });
            
            updateDisplay();
        }

        // 导出图片功能
        function exportToImage() {
            const exportBtn = document.querySelector('.export-btn');
            const originalText = exportBtn.textContent;
            exportBtn.textContent = currentLang === 'zh' ? '生成中...' : 'Generating...';
            exportBtn.disabled = true;
            
            // 获取需要导出的区域（只导出攻防表）
            const offenseSection = document.querySelector('.section.offense');
            const defenseSection = document.querySelector('.section.defense');
            
            // 创建临时容器
            const tempContainer = document.createElement('div');
            tempContainer.style.cssText = `
                background: transparent;
                padding: 0;
                width: auto;
                display: inline-block;
                box-sizing: border-box;
            `;
            
            // 克隆内容（只克隆攻防表）
            const offenseClone = offenseSection.cloneNode(true);
            const defenseClone = defenseSection.cloneNode(true);
            
            // 调整表格样式以适应导出 - 单边框策略（不用collapse）
            const adjustTable = (section) => {
                // 移除section-content背景
                const content = section.querySelector('.section-content');
                if (content) {
                    content.style.background = 'transparent';
                }
                const table = section.querySelector('.compact-table');
                if (table) {
                    table.style.fontSize = '12px';
                    table.style.background = 'transparent';
                    // 表格容器不设置边框
                    table.style.border = 'none';
                }
                // 首先收集所有单元格的位置信息
                const rows = section.querySelectorAll('.compact-table tr');
                const rowCount = rows.length;
                const cellMap = new Map(); // 用于跟踪被rowspan占据的位置
                const rowCellCounts = []; // 记录每行的单元格数量
                let maxColCount = 0; // 最大列数
                
                rows.forEach((row, rowIndex) => {
                    const cells = row.querySelectorAll('td');
                    let actualColIndex = 0;
                    let cellCount = 0;
                    
                    cells.forEach((cell) => {
                        // 跳过被rowspan占据的位置
                        while (cellMap.has(`${rowIndex}-${actualColIndex}`)) {
                            actualColIndex++;
                        }
                        
                        // 存储当前单元格信息
                        const rowspan = parseInt(cell.getAttribute('rowspan')) || 1;
                        const colspan = parseInt(cell.getAttribute('colspan')) || 1;
                        
                        // 标记被rowspan占据的位置
                        for (let r = 0; r < rowspan; r++) {
                            for (let c = 0; c < colspan; c++) {
                                cellMap.set(`${rowIndex + r}-${actualColIndex + c}`, true);
                            }
                        }
                        
                        // 存储单元格位置信息用于后续处理
                        cell.dataset.rowIndex = rowIndex;
                        cell.dataset.colIndex = actualColIndex;
                        cell.dataset.rowspan = rowspan;
                        cell.dataset.colspan = colspan;
                        
                        actualColIndex += colspan;
                        cellCount += colspan;
                    });
                    
                    rowCellCounts.push(cellCount);
                    maxColCount = Math.max(maxColCount, cellCount);
                });
                
                // 简化边框设置 - 和预览保持一致，使用完整边框
                const allCells = section.querySelectorAll('td');
                allCells.forEach(cell => {
                    // 占位单元格保持无边框
                    if (cell.style.border === 'none') {
                        return;
                    }
                    // 其他单元格统一设置完整边框（和CSS一致）
                    cell.style.border = '1px solid #000';
                });
                // 设置列宽度
                const rowHeaders = section.querySelectorAll('.row-header');
                rowHeaders.forEach(header => {
                    header.style.width = '70px';
                    header.style.backgroundColor = '#ffeb3b';
                    if (header.classList.contains('offense')) {
                        header.style.color = '#d32f2f';
                    } else if (header.classList.contains('defense')) {
                        header.style.color = '#1976d2';
                    }
                });
                const categoryCells = section.querySelectorAll('.category-label-cell');
                categoryCells.forEach(cell => {
                    cell.style.width = '76px';
                    cell.style.padding = '0 4px';
                    cell.style.backgroundColor = '#ffffff';
                    cell.style.color = '#000000';
                });
                // 设置属性单元格样式
                const typeCells = section.querySelectorAll('.type-cell');
                typeCells.forEach(cell => {
                    if (cell.style.border === 'none' && cell.style.backgroundColor === 'transparent') return;
                    cell.style.width = '40px';
                    cell.style.minWidth = '40px';
                    cell.style.maxWidth = '40px';
                    cell.style.height = '36px';
                    cell.style.minHeight = '36px';
                    cell.style.maxHeight = '36px';
                    cell.style.padding = '0';
                    cell.style.boxSizing = 'border-box';
                });
                
                // 设置复合属性单元格样式
                const dualTypeCells = section.querySelectorAll('.dual-type-cell');
                dualTypeCells.forEach(cell => {
                    cell.style.width = '70px';
                    cell.style.minWidth = '70px';
                    cell.style.maxWidth = '70px';
                    cell.style.height = '36px';
                    cell.style.minHeight = '36px';
                    cell.style.maxHeight = '36px';
                    cell.style.padding = '0';
                    cell.style.boxSizing = 'border-box';
                    cell.style.position = 'relative';
                    cell.style.overflow = 'hidden';
                });
                // 确保 type-text 样式正确 - 居中显示
                const typeTexts = section.querySelectorAll('.type-text');
                typeTexts.forEach(text => {
                    text.style.display = 'inline-flex';
                    text.style.alignItems = 'center';
                    text.style.justifyContent = 'center';
                    text.style.height = '100%';
                    text.style.width = '100%';
                    text.style.color = 'white';
                    text.style.fontWeight = 'bold';
                    text.style.fontSize = '22px';
                    text.style.textShadow = '0 1px 1px rgba(0,0,0,0.3)';
                    // 如果是circle的子元素，添加圆圈样式
                    if (text.parentElement.classList.contains('circle')) {
                        text.style.border = '2px solid white';
                        text.style.borderRadius = '50%';
                        text.style.padding = '2px 5px';
                        text.style.display = 'inline-flex';
                        text.style.lineHeight = '1';
                    }
                });
            };
            
            adjustTable(offenseClone);
            adjustTable(defenseClone);
            
            // 为section添加样式 - 透明背景
            offenseClone.style.border = 'none';
            offenseClone.style.background = 'transparent';
            offenseClone.style.boxShadow = 'none';
            offenseClone.style.marginBottom = '8px';
            offenseClone.style.borderRadius = '0';
            offenseClone.style.overflow = 'visible';
            defenseClone.style.border = 'none';
            defenseClone.style.background = 'transparent';
            defenseClone.style.boxShadow = 'none';
            defenseClone.style.marginBottom = '0';
            defenseClone.style.borderRadius = '0';
            defenseClone.style.overflow = 'visible';
            
            tempContainer.appendChild(offenseClone);
            tempContainer.appendChild(defenseClone);
            
            document.body.appendChild(tempContainer);
            
            html2canvas(tempContainer, {
                backgroundColor: null,
                scale: 4,
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                // 下载图片
                const link = document.createElement('a');
                link.download = `pokemon-type-chart-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // 清理
                document.body.removeChild(tempContainer);
                exportBtn.textContent = originalText;
                exportBtn.disabled = false;
            }).catch(err => {
                console.error('Export failed:', err);
                alert(currentLang === 'zh' ? '导出失败，请重试' : 'Export failed, please try again');
                document.body.removeChild(tempContainer);
                exportBtn.textContent = originalText;
                exportBtn.disabled = false;
            });
        }

        // 导出盲点表格功能
        function exportBlindspotToImage() {

            const originalText = exportBtn.textContent;
            exportBtn.textContent = '生成中...';
            exportBtn.disabled = true;
            
            // 获取盲点表格区域
            const blindspotSection = document.querySelector('.section.blindspot');
            
            // 创建临时容器
            const tempContainer = document.createElement('div');
            tempContainer.style.cssText = `
                background: transparent;
                padding: 0;
                width: auto;
                display: inline-block;
                box-sizing: border-box;
            `;
            
            // 克隆盲点内容
            const blindspotClone = blindspotSection.cloneNode(true);
            
            // 调整表格样式
            const adjustTable = (section) => {
                const content = section.querySelector('.section-content');
                if (content) {
                    content.style.background = 'transparent';
                }
                const table = section.querySelector('.compact-table');
                if (table) {
                    table.style.fontSize = '12px';
                    table.style.background = 'transparent';
                    table.style.border = 'none';
                    table.style.borderSpacing = '0';
                }
                const allCells = section.querySelectorAll('td');
                allCells.forEach(cell => {
                    if (cell.style.border === 'none' && cell.style.backgroundColor === 'transparent') return;
                    cell.style.border = '1px solid #000';
                });
                const rowHeaders = section.querySelectorAll('.row-header');
                rowHeaders.forEach(header => {
                    header.style.width = '70px';
                    header.style.backgroundColor = '#ffeb3b';
                    if (header.classList.contains('blindspot')) {
                        header.style.color = '#9b59b6';
                    }
                });
                const categoryCells = section.querySelectorAll('.category-label-cell');
                categoryCells.forEach(cell => {
                    cell.style.width = '76px';
                    cell.style.padding = '0 4px';
                    cell.style.backgroundColor = '#ffffff';
                    cell.style.color = '#000000';
                });
                const dualTypeCells = section.querySelectorAll('.dual-type-cell');
                dualTypeCells.forEach(cell => {
                    cell.style.width = '70px';
                    cell.style.minWidth = '70px';
                    cell.style.maxWidth = '70px';
                    cell.style.height = '36px';
                    cell.style.minHeight = '36px';
                    cell.style.maxHeight = '36px';
                    cell.style.padding = '0';
                    cell.style.boxSizing = 'border-box';
                    cell.style.background = 'transparent';
                    cell.style.color = '#000';
                });
                const typeTexts = section.querySelectorAll('.type-text');
                typeTexts.forEach(text => {
                    text.style.display = 'inline-flex';
                    text.style.alignItems = 'center';
                    text.style.justifyContent = 'center';
                    text.style.height = '100%';
                    text.style.width = '100%';
                    text.style.color = '#000';
                    text.style.fontWeight = 'bold';
                    text.style.fontSize = '14px';
                });
            };
            
            adjustTable(blindspotClone);
            
            blindspotClone.style.border = 'none';
            blindspotClone.style.background = 'transparent';
            blindspotClone.style.boxShadow = 'none';
            blindspotClone.style.marginBottom = '0';
            blindspotClone.style.borderRadius = '0';
            blindspotClone.style.overflow = 'visible';
            
            tempContainer.appendChild(blindspotClone);
            
            document.body.appendChild(tempContainer);
            
            html2canvas(tempContainer, {
                backgroundColor: null,
                scale: 4,
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `pokemon-blindspot-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                document.body.removeChild(tempContainer);
                exportBtn.textContent = originalText;
                exportBtn.disabled = false;
            }).catch(err => {
                console.error('Export failed:', err);
                alert(currentLang === 'zh' ? '导出失败，请重试' : 'Export failed, please try again');
                document.body.removeChild(tempContainer);
                exportBtn.textContent = originalText;
                exportBtn.disabled = false;
            });
        }

        // 初始化
        init();
    </script>
</body>
</html>
